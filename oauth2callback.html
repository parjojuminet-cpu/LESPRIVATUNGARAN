<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Google Sheets OAuth Callback</title>
</head>
<body>
  <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
    <h2>Mengautentikasi...</h2>
    <p>Mohon tunggu sebentar, sistem sedang menghubungkan ke Google Sheets.</p>
  </div>
  <script>
    try {
      const hash = window.location.hash;
      if (hash && window.opener) {
        window.opener.postMessage({ type: 'oauth_response', hash: hash }, window.location.origin);
      } else {
        // Fallback for redirect flow if popup context isn't clean
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');
        if (token) {
          localStorage.setItem('google_access_token', token);
          window.location.href = '/';
        }
      }
    } catch (e) {
      console.error('OAuth Callback Error:', e);
    }
  </script>
</body>
</html>
